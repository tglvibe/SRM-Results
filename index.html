<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #334155); padding: 24px 32px; border-bottom: 1px solid #475569; }
.header h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; }
.header p { color: #94a3b8; margin-top: 4px; font-size: 14px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.grid { display: grid; gap: 20px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-1 { grid-template-columns: 1fr; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
.card h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.stat-card { text-align: center; }
.stat-card .value { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .label { font-size: 13px; color: #94a3b8; margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
.section-title { font-size: 18px; font-weight: 700; color: #f1f5f9; margin: 28px 0 16px 0; padding-bottom: 8px; border-bottom: 2px solid #334155; }
.chart-container { position: relative; width: 100%; }
.chart-container canvas { max-height: 300px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #334155; color: #e2e8f0; padding: 10px 12px; text-align: left; font-weight: 600; position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid #2d3748; }
tr:hover td { background: #2d3748; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-green { background: #065f46; color: #6ee7b7; }
.badge-blue { background: #1e3a5f; color: #93c5fd; }
.badge-yellow { background: #713f12; color: #fcd34d; }
.badge-red { background: #7f1d1d; color: #fca5a5; }
.badge-purple { background: #4c1d95; color: #c4b5fd; }
.badge-gray { background: #374151; color: #9ca3af; }
.progress-bar { background: #334155; border-radius: 4px; height: 20px; overflow: hidden; position: relative; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.progress-label { position: absolute; right: 6px; top: 2px; font-size: 11px; font-weight: 600; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid #475569; color: #94a3b8; background: transparent; transition: all 0.2s; }
.tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
.tab:hover:not(.active) { border-color: #60a5fa; color: #e2e8f0; }
.insight-box { background: #1a2332; border-left: 4px solid #3b82f6; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
.insight-box strong { color: #60a5fa; }
.difficulty-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.difficulty-bar .label { width: 50px; font-size: 12px; color: #94a3b8; }
.difficulty-bar .bar { flex: 1; height: 14px; background: #334155; border-radius: 3px; overflow: hidden; }
.difficulty-bar .fill { height: 100%; border-radius: 3px; }
.difficulty-bar .pct { width: 45px; font-size: 12px; text-align: right; }
@media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3, .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
